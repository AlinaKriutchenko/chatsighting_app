<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatsighting — Find the Most Hype Moments in Any Twitch VOD</title>
  <meta name="description" content="Free Twitch VOD chat analyser. Find the moments when chat went most crazy, with timestamps you can jump to directly. No login needed.">
  <meta property="og:title" content="Chatsighting — Find the Most Hype Moments in Any Twitch VOD">
  <meta property="og:description" content="Free Twitch VOD chat analyser. Find the moments when chat went most crazy, with timestamps you can jump to directly. No login needed.">
  <meta property="og:url" content="https://chatsighting.com">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230e0e10'/><text y='78' x='50' text-anchor='middle' font-size='72' font-family='system-ui,sans-serif' font-weight='700' fill='%23bf94ff'>C</text></svg>">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6YC7Y8YQM7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6YC7Y8YQM7');

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0e0e10;
      color: #efeff1;
      min-height: 100vh;
    }

    header {
      padding: 2rem 2rem 1rem;
      border-bottom: 1px solid #1f1f23;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #bf94ff;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 0.85rem;
      color: #adadb8;
      margin-top: 0.25rem;
    }

    .search-bar {
      display: flex;
      gap: 0.5rem;
      padding: 1.5rem 2rem;
      max-width: 520px;
    }

    .search-bar input {
      flex: 1;
      background: #18181b;
      border: 1px solid #2d2d35;
      border-radius: 6px;
      color: #efeff1;
      font-size: 0.95rem;
      padding: 0.55rem 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-bar input:focus { border-color: #bf94ff; }
    .search-bar input::placeholder { color: #53535f; }

    .search-bar button {
      background: #bf94ff;
      border: none;
      border-radius: 6px;
      color: #0e0e10;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.55rem 1.2rem;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .search-bar button:hover { background: #a970ff; }
    .search-bar button:disabled { background: #3d3d48; color: #6e6e7a; cursor: not-allowed; }

    main { padding: 0 2rem 3rem; }

    .status {
      color: #adadb8;
      font-size: 0.9rem;
      padding: 0.5rem 0 1.5rem;
    }

    /* VOD picker */
    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #53535f;
      margin-bottom: 0.75rem;
    }

    .vod-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 620px;
      margin-bottom: 1.5rem;
    }

    .vod-row {
      background: #18181b;
      border: 1px solid #1f1f23;
      border-radius: 8px;
      padding: 0.85rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .vod-row:hover { border-color: #3d3d48; }
    .vod-row.selected { border-color: #bf94ff; background: #1a1225; }

    .vod-row-info { flex: 1; min-width: 0; }

    .vod-row-title {
      font-size: 0.92rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .vod-row-meta {
      font-size: 0.78rem;
      color: #adadb8;
      margin-top: 0.2rem;
      display: flex;
      gap: 0.75rem;
    }

    .vod-row-duration {
      font-size: 0.82rem;
      color: #53535f;
      white-space: nowrap;
    }

    .analyze-vod-btn {
      background: #bf94ff;
      border: none;
      border-radius: 6px;
      color: #0e0e10;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.45rem 1rem;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .analyze-vod-btn:hover { background: #a970ff; }
    .analyze-vod-btn:disabled { background: #3d3d48; color: #6e6e7a; cursor: not-allowed; }

    /* Results */
    .vod-info {
      background: #18181b;
      border: 1px solid #1f1f23;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      max-width: 640px;
    }

    .vod-info h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .vod-meta {
      font-size: 0.8rem;
      color: #adadb8;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .vod-meta a { color: #bf94ff; text-decoration: none; }
    .vod-meta a:hover { text-decoration: underline; }

    .back-btn {
      background: none;
      border: 1px solid #2d2d35;
      border-radius: 6px;
      color: #adadb8;
      cursor: pointer;
      font-size: 0.82rem;
      padding: 0.35rem 0.75rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.15s, color 0.15s;
    }

    .back-btn:hover { border-color: #bf94ff; color: #bf94ff; }

    .spikes-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      max-width: 1000px;
    }

    .spike-card {
      background: #18181b;
      border: 1px solid #1f1f23;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color 0.15s;
    }

    .spike-card:hover { border-color: #3d3d48; }

    .spike-rank {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #bf94ff;
    }

    .spike-time {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .spike-count { font-size: 0.85rem; color: #adadb8; }
    .spike-count strong { color: #efeff1; }
    .spike-avg { font-size: 0.75rem; color: #53535f; }

    .spike-words { display: flex; flex-wrap: wrap; gap: 0.4rem; }

    .word-tag {
      background: #1f1f23;
      border: 1px solid #2d2d35;
      border-radius: 4px;
      font-size: 0.78rem;
      padding: 0.2rem 0.5rem;
      color: #adadb8;
    }

    .spike-link {
      font-size: 0.82rem;
      color: #bf94ff;
      text-decoration: none;
      align-self: flex-start;
    }

    .spike-link:hover { text-decoration: underline; }

    .spike-toggle {
      background: none;
      border: none;
      color: #53535f;
      cursor: pointer;
      font-size: 0.78rem;
      padding: 0;
      text-align: left;
      transition: color 0.15s;
    }

    .spike-toggle:hover { color: #adadb8; }

    .spike-messages {
      display: none;
      flex-direction: column;
      gap: 0.35rem;
      max-height: 260px;
      overflow-y: auto;
      border-top: 1px solid #1f1f23;
      padding-top: 0.65rem;
      margin-top: 0.1rem;
    }

    .spike-messages.open { display: flex; }

    .chat-msg {
      font-size: 0.8rem;
      line-height: 1.4;
    }

    .chat-msg .chatter {
      color: #bf94ff;
      font-weight: 600;
      margin-right: 0.3rem;
    }

    .chat-msg .body { color: #adadb8; }

    /* chart */
    .chart-wrap {
      background: #18181b;
      border: 1px solid #1f1f23;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      max-width: 860px;
    }

    .chart-wrap h3 {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #53535f;
      margin-bottom: 0.75rem;
    }

    /* spike count toggle */
    .count-toggle {
      display: flex;
      gap: 0.35rem;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .count-toggle span {
      font-size: 0.78rem;
      color: #53535f;
      margin-right: 0.15rem;
    }

    .count-btn {
      background: #18181b;
      border: 1px solid #2d2d35;
      border-radius: 4px;
      color: #adadb8;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.25rem 0.6rem;
      transition: border-color 0.15s, color 0.15s;
    }

    .count-btn:hover { border-color: #bf94ff; color: #bf94ff; }
    .count-btn.active { border-color: #bf94ff; color: #bf94ff; background: #1a1225; }

    .error {
      background: #18181b;
      border: 1px solid #2d2d35;
      border-radius: 8px;
      color: #adadb8;
      font-size: 0.9rem;
      max-width: 480px;
      padding: 0.85rem 1rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <header>
    <h1>Chatsighting</h1>
  </header>
  <div style="padding:0.5rem 2rem;font-size:0.75rem;color:#53535f;border-bottom:1px solid #1f1f23;">
    A personal project. Streamers must have past broadcasts enabled on their Twitch channel. Chat is fetched live and never stored.
    <!-- Personal project by <a href="https://twitch.tv/alinamic" target="_blank" style="color:#53535f;">alinamic</a> &mdash; chat is fetched live and never stored. We temporarily log request IPs to prevent abuse. -->
  </div>

  <div class="search-bar">
    <input id="username" type="text" placeholder="Enter Twitch username" autocomplete="off" />
    <button id="searchBtn" onclick="fetchVODs()">Search</button>
  </div>

  <main id="main"></main>

  <script>
    const input    = document.getElementById('username');
    const searchBtn = document.getElementById('searchBtn');
    const main     = document.getElementById('main');

    let spikeCount = 5; // default

    input.addEventListener('keydown', e => { if (e.key === 'Enter') fetchVODs(); });

    // ── Step 1: fetch VOD list ───────────────────────────────────────────────
    async function fetchVODs() {
      const username = input.value.trim();
      if (!username) { input.focus(); return; }

      searchBtn.disabled = true;
      searchBtn.textContent = 'Searching…';
      main.innerHTML = `<p class="status">Looking up <strong>${escapeHTML(username)}</strong>…</p>`;

      try {
        const res = await fetch(`/api/vods?username=${encodeURIComponent(username)}`);
        const text = await res.text();
        if (!res.ok) {
          main.innerHTML = `<div class="error">${escapeHTML(text.trim())}</div>`;
          return;
        }
        const { user, vods } = JSON.parse(text);
        renderVODPicker(user, vods);
      } catch (err) {
        main.innerHTML = `<div class="error">Request failed: ${escapeHTML(err.message)}</div>`;
      } finally {
        searchBtn.disabled = false;
        searchBtn.textContent = 'Search';
      }
    }

    // ── Step 2: show VOD cards ───────────────────────────────────────────────
    function renderVODPicker(user, vods) {
      const rows = vods.map((vod, i) => {
        const date = new Date(vod.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const dur  = formatSeconds(parseDuration(vod.duration));
        return `
          <div class="vod-row" id="row-${i}" onclick="selectVOD(${i})">
            <div class="vod-row-info">
              <div class="vod-row-title" title="${escapeHTML(vod.title)}">${escapeHTML(vod.title)}</div>
              <div class="vod-row-meta">
                <span>${date}</span>
                <span>${vod.view_count.toLocaleString()} views</span>
              </div>
            </div>
            <div class="vod-row-duration">${dur}</div>
            <button class="analyze-vod-btn" id="btn-${i}" onclick="event.stopPropagation(); analyzeVOD('${escapeHTML(vod.id)}', ${i})">Analyze</button>
          </div>`;
      }).join('');

      main.innerHTML = `
        <div class="section-label">Recent VODs — ${escapeHTML(user.display_name)}</div>
        <div class="vod-list">${rows}</div>`;

      // store vods for reference
      main._vods = vods;
    }

    function selectVOD(i) {
      document.querySelectorAll('.vod-row').forEach(r => r.classList.remove('selected'));
      document.getElementById(`row-${i}`)?.classList.add('selected');
    }

    // ── Step 3: analyze chosen VOD ───────────────────────────────────────────
    let _currentAbort = null;

    function cancelAnalysis() {
      if (_currentAbort) { _currentAbort.abort(); _currentAbort = null; }
    }

    async function analyzeVOD(vodID, rowIdx) {
      // cancel any in-progress analysis first
      cancelAnalysis();

      const controller = new AbortController();
      _currentAbort = controller;

      document.querySelectorAll('.analyze-vod-btn').forEach(b => { b.disabled = true; });
      const btn = document.getElementById(`btn-${rowIdx}`);
      if (btn) btn.textContent = 'Analyzing…';

      main.insertAdjacentHTML('afterbegin', `<p class="status" id="progress-msg">Fetching chat — this takes ~30–60s for long streams… <button onclick="cancelAnalysis()" style="background:none;border:none;color:#bf94ff;cursor:pointer;font-size:0.85rem;padding:0;margin-left:0.5rem;">Cancel</button></p>`);

      try {
        const res = await fetch(`/api/analysis?vod_id=${encodeURIComponent(vodID)}&count=10`, { signal: controller.signal });
        const text = await res.text();
        document.getElementById('progress-msg')?.remove();

        if (!res.ok) {
          main.insertAdjacentHTML('afterbegin', `<div class="error" style="margin-bottom:1rem">${escapeHTML(text.trim())}</div>`);
          return;
        }
        _lastResult = JSON.parse(text);
        renderResults(_lastResult);
      } catch (err) {
        document.getElementById('progress-msg')?.remove();
        if (err.name !== 'AbortError') {
          main.insertAdjacentHTML('afterbegin', `<div class="error" style="margin-bottom:1rem">Request failed: ${escapeHTML(err.message)}</div>`);
        }
      } finally {
        _currentAbort = null;
        document.querySelectorAll('.analyze-vod-btn').forEach(b => { b.disabled = false; b.textContent = 'Analyze'; });
      }
    }

    // ── Step 4: render spikes ────────────────────────────────────────────────
    let _chart = null;

    function renderResults({ vod, spikes: allSpikes, stream_average, windows }) {
      const spikes = (allSpikes || []).slice(0, spikeCount);
      if (!spikes || spikes.length === 0) {
        main.innerHTML = `<p class="status">No spikes found in this VOD.</p>`;
        return;
      }

      const totalSecs = parseDuration(vod.duration);
      const date = new Date(vod.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

      const countToggle = `
        <div class="count-toggle">
          <span>Show</span>
          ${[3,5,10].map(n => `<button class="count-btn${spikeCount===n?' active':''}" onclick="setCount(${n})">${n}</button>`).join('')}
          <span>spikes</span>
        </div>`;

      const vodHTML = `
        <button class="back-btn" onclick="goBack()">← Back to VODs</button>
        <div class="vod-info">
          <h2>${escapeHTML(vod.title)}</h2>
          <div class="vod-meta">
            <span>${date}</span>
            <span>${formatSeconds(totalSecs)} long</span>
            <a href="https://www.twitch.tv/videos/${vod.id}" target="_blank">Watch VOD</a>
          </div>
        </div>
        <div class="chart-wrap">
          <h3>Chat activity</h3>
          <canvas id="activityChart" height="90"></canvas>
        </div>
        ${countToggle}`;

      const cardsHTML = spikes.map((spike, i) => {
        const url      = vodTimestampURL(vod.id, spike.StartSeconds);
        const words    = (spike.TopWords || []).map(w => `<span class="word-tag">${escapeHTML(w)}</span>`).join('');
        const msgs     = (spike.Messages || []).map(m =>
          `<div class="chat-msg"><span class="chatter">${escapeHTML(m.Commenter?.DisplayName||'?')}:</span><span class="body">${escapeHTML(m.Message?.Body||'')}</span></div>`
        ).join('');
        return `
          <div class="spike-card">
            <div class="spike-rank">Spike #${spike.Rank}</div>
            <div class="spike-time">${formatSeconds(spike.StartSeconds)}</div>
            <div class="spike-count"><strong>${spike.MessageCount}</strong> messages in 30s &nbsp;<span style="color:#bf94ff;font-weight:700;">${(spike.MessageCount / stream_average).toFixed(1)}×</span></div>
            <div class="spike-avg">stream average: ${stream_average} per 30s</div>
            <div class="spike-words">${words}</div>
            <a class="spike-link" href="${url}" target="_blank">Jump to moment →</a>
            <button class="spike-toggle" onclick="toggleMessages(${i})">▸ Show chat</button>
            <div class="spike-messages" id="msgs-${i}">${msgs}</div>
          </div>`;
      }).join('');

      main.innerHTML = vodHTML + `<div class="spikes-grid">${cardsHTML}</div>`;

      // draw chart after DOM is updated
      if (windows && windows.length) drawChart(windows, spikes);
    }

    function drawChart(windows, spikes) {
      if (_chart) { _chart.destroy(); _chart = null; }

      const spikeSeconds = new Set(spikes.map(s => s.StartSeconds));
      const labels  = windows.map(w => formatSeconds(w.s));
      const counts  = windows.map(w => w.c);
      const pointColors = windows.map(w =>
        spikeSeconds.has(w.s) ? '#bf94ff' : 'transparent'
      );
      const pointRadius = windows.map(w =>
        spikeSeconds.has(w.s) ? 4 : 0
      );

      const ctx = document.getElementById('activityChart');
      if (!ctx) return;

      _chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: counts,
            borderColor: '#3d3d48',
            borderWidth: 1.5,
            fill: true,
            backgroundColor: 'rgba(30,30,35,0.6)',
            tension: 0.3,
            pointBackgroundColor: pointColors,
            pointRadius,
            pointHoverRadius: 5,
          }]
        },
        options: {
          animation: false,
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                title: items => items[0].label,
                label: item => `${item.raw} messages`
              },
              backgroundColor: '#18181b',
              titleColor: '#efeff1',
              bodyColor: '#adadb8',
              borderColor: '#2d2d35',
              borderWidth: 1,
            }
          },
          scales: {
            x: {
              ticks: {
                color: '#53535f',
                maxTicksLimit: 8,
                font: { size: 10 }
              },
              grid: { color: '#1f1f23' }
            },
            y: {
              ticks: { color: '#53535f', font: { size: 10 } },
              grid: { color: '#1f1f23' },
              beginAtZero: true,
            }
          }
        }
      });
    }

    function goBack() {
      fetchVODs();
    }

    function toggleMessages(i) {
      const panel  = document.getElementById(`msgs-${i}`);
      const toggle = panel?.previousElementSibling;
      if (!panel) return;
      const open = panel.classList.toggle('open');
      if (toggle) toggle.textContent = open ? '▾ Hide chat' : '▸ Show chat';
    }

    let _lastResult = null;
    function setCount(n) {
      spikeCount = n;
      if (_lastResult) {
        renderResults(_lastResult);
        // chart doesn't change with count, but canvas is re-created so redraw
        if (_lastResult.windows) drawChart(_lastResult.windows, (_lastResult.spikes||[]).slice(0, n));
      }
    }

    // ── Helpers ──────────────────────────────────────────────────────────────
    function formatSeconds(s) {
      s = Math.floor(s);
      const h   = Math.floor(s / 3600);
      const m   = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      if (h > 0) return `${h}h ${m.toString().padStart(2,'0')}m ${sec.toString().padStart(2,'0')}s`;
      return `${m}m ${sec.toString().padStart(2,'0')}s`;
    }

    function parseDuration(dur) {
      let total = 0;
      const h = dur.match(/(\d+)h/); if (h) total += parseInt(h[1]) * 3600;
      const m = dur.match(/(\d+)m/); if (m) total += parseInt(m[1]) * 60;
      const s = dur.match(/(\d+)s/); if (s) total += parseInt(s[1]);
      return total;
    }

    function vodTimestampURL(vodID, seconds) {
      const s   = Math.floor(seconds);
      const h   = Math.floor(s / 3600);
      const m   = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return `https://www.twitch.tv/videos/${vodID}?t=${h}h${m}m${sec}s`;
    }

    function escapeHTML(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }
  </script>
  <div style="padding:1rem 2rem;font-size:0.75rem;color:#53535f;border-top:1px solid #1f1f23;margin-top:2rem;">
    <a href="https://ko-fi.com/alina31606" target="_blank" style="color:#53535f;text-decoration:none;" onmouseover="this.style.color='#bf94ff'" onmouseout="this.style.color='#53535f'">☕ Support this project</a>
  </div>
</body>
</html>
